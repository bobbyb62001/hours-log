<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hours Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #12161D;
    color: #E7E9EE;
    font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
    padding: 32px 16px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .wrap { width: 100%; max-width: 480px; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #7A8497;
  }
  .header-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
  }
  .month-nav { display: flex; align-items: center; gap: 4px; }
  .month-nav button {
    background: none; border: none; color: #7A8497; cursor: pointer; padding: 4px;
    display: flex; font-size: 16px;
  }
  .month-nav button:hover { color: #E7E9EE; }
  .month-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    color: #C3C8D1; width: 108px; text-align: center;
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace; font-size: 30px; font-weight: 600;
    letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  h1 .slash { color: #7A8497; font-size: 18px; font-weight: 400; }
  h1 .unit { color: #7A8497; font-size: 14px; font-weight: 400; }
  #targetInput {
    width: 64px; background: transparent; border: none; border-bottom: 1px dashed #3A4150;
    color: #C9A227; font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600;
    padding: 0 2px;
  }
  .meter-wrap { margin-bottom: 28px; }
  .meter-track {
    height: 8px; border-radius: 4px; background: #1D232D; overflow: hidden; border: 1px solid #262D39;
  }
  .meter-fill { height: 100%; transition: width 0.3s ease; }
  .meter-info {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7A8497;
  }
  .card {
    background: #1A1F28; border: 1px solid #262D39; border-radius: 10px; padding: 16px; margin-bottom: 24px;
  }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row:last-of-type { margin-bottom: 0; }
  input[type="date"], input[type="number"], input[type="text"] {
    background: #12161D; border: 1px solid #2C3340; border-radius: 6px; color: #E7E9EE;
    padding: 8px 10px; font-size: 13px; font-family: inherit;
  }
  input[type="date"], input[type="number"].hrs { font-family: 'IBM Plex Mono', monospace; }
  input::placeholder { color: #5B6472; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
  #dateInput { flex: 1; }
  #hoursInput { width: 70px; }
  #noteInput { flex: 1; }
  #addBtn {
    display: flex; align-items: center; gap: 6px; background: #C9A227; color: #12161D;
    border: none; border-radius: 6px; padding: 8px 14px; font-weight: 600; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  #addBtn:hover { opacity: 0.9; }
  .error { color: #D9736B; font-size: 12px; margin-top: 8px; }
  .empty { text-align: center; color: #5B6472; font-size: 13px; padding: 24px 0; }
  .entry-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 2px; border-bottom: 1px solid #1E2430;
  }
  .entry-date {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7A8497; width: 78px; flex-shrink: 0;
  }
  .entry-note { flex: 1; font-size: 13px; color: #C3C8D1; }
  .entry-note.empty-note { color: #4A5261; }
  .entry-hours {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: #E7E9EE;
    width: 44px; text-align: right;
  }
  .del-btn {
    background: none; border: none; color: #7A8497; cursor: pointer; padding: 4px;
    opacity: 0; transition: opacity 0.15s;
  }
  .entry-row:hover .del-btn { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <div class="eyebrow">HOURS LOG</div>
    <div class="month-nav">
      <button id="prevMonth" aria-label="Previous month">&#8592;</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth" aria-label="Next month">&#8594;</button>
    </div>
  </div>

  <h1>
    <span id="totalDisplay">0.0</span>
    <span class="slash">/</span>
    <input type="number" id="targetInput" min="0" step="0.5" />
    <span class="unit">hrs</span>
  </h1>

  <div class="meter-wrap">
    <div class="meter-track"><div class="meter-fill" id="meterFill"></div></div>
    <div class="meter-info">
      <span id="entryCount">0 entries</span>
      <span id="remainingText">0 hrs remaining</span>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input type="date" id="dateInput" />
      <input type="number" id="hoursInput" class="hrs" min="0" step="0.25" placeholder="hrs" />
    </div>
    <div class="row">
      <input type="text" id="noteInput" placeholder="What did you work on? (optional)" />
      <button id="addBtn">+ Log</button>
    </div>
    <div class="error" id="errorMsg"></div>
  </div>

  <div id="entriesList"></div>
</div>

<script>
  const STORAGE_KEY = "hourslog.entries";
  const TARGETS_KEY = "hourslog.targets";

  // Pulled from the 2026 corporate calendar (Work Hours column, sums to 2000 annual).
  const DEFAULT_TARGETS = {
    "2026-01": 160, "2026-02": 152, "2026-03": 176, "2026-04": 176,
    "2026-05": 160, "2026-06": 168, "2026-07": 176, "2026-08": 168,
    "2026-09": 168, "2026-10": 168, "2026-11": 152, "2026-12": 176,
  };

  function loadJSON(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) {
      return fallback;
    }
  }
  function saveJSON(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }

  let entries = loadJSON(STORAGE_KEY, []);
  let targets = Object.assign({}, DEFAULT_TARGETS, loadJSON(TARGETS_KEY, {}));

  function todayISO() { return new Date().toISOString().slice(0, 10); }
  function currentMonthKey() { return todayISO().slice(0, 7); }
  let viewMonth = currentMonthKey();

  function monthLabel(key) {
    const [y, m] = key.split("-").map(Number);
    const d = new Date(y, m - 1, 1);
    return d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  }
  function shiftMonth(key, delta) {
    const [y, m] = key.split("-").map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
  }
  function formatDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  const dateInput = document.getElementById("dateInput");
  const hoursInput = document.getElementById("hoursInput");
  const noteInput = document.getElementById("noteInput");
  const targetInput = document.getElementById("targetInput");
  const errorMsg = document.getElementById("errorMsg");

  dateInput.value = todayISO();

  function render() {
    document.getElementById("monthLabel").textContent = monthLabel(viewMonth).toUpperCase();
    const target = targets[viewMonth] ?? 160;
    targetInput.value = target;

    const monthEntries = entries.filter(e => e.date.slice(0, 7) === viewMonth);
    const total = monthEntries.reduce((sum, e) => sum + Number(e.hours || 0), 0);
    const remaining = Math.max(target - total, 0);
    const pct = target > 0 ? Math.min((total / target) * 100, 100) : 0;
    const over = total > target;

    document.getElementById("totalDisplay").textContent = total.toFixed(1);
    const fill = document.getElementById("meterFill");
    fill.style.width = pct + "%";
    fill.style.background = over ? "#B33A3A" : "#C9A227";

    document.getElementById("entryCount").textContent =
      monthEntries.length + (monthEntries.length === 1 ? " entry" : " entries");
    const remainingText = document.getElementById("remainingText");
    remainingText.textContent = over
      ? `+${(total - target).toFixed(1)} hrs over`
      : `${remaining.toFixed(1)} hrs remaining`;
    remainingText.style.color = over ? "#D9736B" : "#7A8497";

    const sorted = [...monthEntries].sort((a, b) => (a.date < b.date ? 1 : -1));
    const list = document.getElementById("entriesList");
    list.innerHTML = "";
    if (sorted.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = `No hours logged for ${monthLabel(viewMonth)}.`;
      list.appendChild(empty);
    } else {
      sorted.forEach(e => {
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `
          <div class="entry-date">${formatDate(e.date)}</div>
          <div class="entry-note ${e.note ? "" : "empty-note"}">${e.note ? escapeHtml(e.note) : "—"}</div>
          <div class="entry-hours">${Number(e.hours).toFixed(2)}</div>
          <button class="del-btn" data-id="${e.id}" aria-label="Delete">&#10005;</button>
        `;
        list.appendChild(row);
      });
      list.querySelectorAll(".del-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          entries = entries.filter(e => e.id !== btn.dataset.id);
          saveJSON(STORAGE_KEY, entries);
          render();
        });
      });
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  document.getElementById("prevMonth").addEventListener("click", () => {
    viewMonth = shiftMonth(viewMonth, -1);
    render();
  });
  document.getElementById("nextMonth").addEventListener("click", () => {
    viewMonth = shiftMonth(viewMonth, 1);
    render();
  });

  targetInput.addEventListener("change", () => {
    const val = Math.max(0, Number(targetInput.value) || 0);
    targets[viewMonth] = val;
    saveJSON(TARGETS_KEY, targets);
    render();
  });

  document.getElementById("addBtn").addEventListener("click", addEntry);
  noteInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addEntry(); });

  function addEntry() {
    const h = parseFloat(hoursInput.value);
    errorMsg.textContent = "";
    if (!dateInput.value) {
      errorMsg.textContent = "Pick a date.";
      return;
    }
    if (!h || h <= 0) {
      errorMsg.textContent = "Enter hours greater than 0.";
      return;
    }
    entries.push({ id: uid(), date: dateInput.value, hours: h, note: noteInput.value.trim() });
    saveJSON(STORAGE_KEY, entries);
    hoursInput.value = "";
    noteInput.value = "";
    render();
  }

  render();
</script>
</body>
</html>
